# fly.toml app configuration file generated for epic-planner on 2026-05-21T01:53:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'epic-planner'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
