# fly.toml – generated for epic-planner
# Run `fly launch` once to create the app, then `fly deploy` to redeploy.

app = "epic-planner"
primary_region = "lax"   # LA – closest to Disneyland

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
